<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JD Workspace v10</title><link rel="stylesheet" href="styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script><script defer src="storage.js"></script><script defer src="calendar.js"></script><script defer src="excel.js"></script><script defer src="app.js"></script></head><body>
<header class="topbar"><div><h1>JD Workspace v10</h1><div id="last-save" class="subtle">마지막 저장: -</div></div><div class="toolbar"><button class="btn primary" id="save-now">저장</button><button class="btn" id="load-now">불러오기</button><button class="btn" id="excel-export">Excel</button><button class="btn" id="excel-import-btn">가져오기</button><input id="excel-import" type="file" accept=".xlsx,.xls" hidden><button class="btn" id="json-backup">백업</button><span id="sync-status" class="status">대기</span></div></header>
<main class="layout">
<section class="panel schedule-panel"><div class="panel-head"><div class="panel-title">Schedule</div><div class="panel-actions"><button class="icon-btn" id="cal-add">＋</button><button class="icon-btn" id="cal-edit">✎</button><button class="icon-btn" id="cal-settings">⋯</button></div></div><iframe id="calendar-frame" title="Google Calendar"></iframe></section>
<section class="panel archive-panel"><div class="panel-head"><div class="panel-title">Archive</div><div class="panel-actions"><button class="icon-btn" id="new-workspace">＋W</button><button class="icon-btn" id="new-project">＋P</button><button class="icon-btn" id="new-task">＋T</button></div></div><div class="panel-body"><input id="search" class="search" type="search" placeholder="검색"><div class="tabs"><button class="tab active" data-view="active">진행</button><button class="tab" data-view="completedTasks">완료 업무</button><button class="tab" data-view="completedProjects">완료 프로젝트</button><button class="tab" data-view="trash">휴지통</button></div><div id="archive-list"></div></div></section>
<section class="panel content-panel"><div class="panel-head"><div class="panel-title">Content</div><div class="panel-actions"><button class="icon-btn hidden" id="edit-item">수정</button><button class="icon-btn hidden" id="save-edit">저장</button><button class="icon-btn hidden" id="cancel-edit">취소</button></div></div><div id="detail" class="panel-body"></div></section>
</main>
<dialog id="workspace-dialog"><form class="dialog-card" id="workspace-form"><h3>Workspace</h3><label>이름<input id="workspace-title" required></label><label>색상<select id="workspace-color"><option value="#007aff">Blue</option><option value="#34c759">Green</option><option value="#af52de">Purple</option><option value="#ff9500">Orange</option><option value="#ff3b30">Red</option><option value="#5ac8fa">Sky</option><option value="#8e8e93">Gray</option></select></label><div class="dialog-actions"><button class="btn" type="button" data-close="workspace-dialog">취소</button><button class="btn primary" type="submit">저장</button></div></form></dialog>
<dialog id="project-dialog"><form class="dialog-card" id="project-form"><h3>Project</h3><label>Workspace<select id="project-workspace"></select></label><label>프로젝트명<input id="project-title" required></label><div class="dialog-actions"><button class="btn" type="button" data-close="project-dialog">취소</button><button class="btn primary" type="submit">생성</button></div></form></dialog>
<dialog id="task-dialog"><form class="dialog-card" id="task-form"><h3>Task</h3><label>Project<select id="task-project"></select></label><label>제목<input id="task-title" required></label><label>메모<textarea id="task-memo"></textarea></label><div class="dialog-actions"><button class="btn" type="button" data-close="task-dialog">취소</button><button class="btn primary" type="submit">생성</button></div></form></dialog>
</body></html>
