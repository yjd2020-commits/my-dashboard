HTML
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard v5.8 - Realtime Cloud Sync</title>
    <!-- Supabase 공식 실시간 데이터베이스 라이브러리 탑재 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --apple-blue: #0071e3;
            --apple-green: #34c759;
            --apple-red: #ff3b30;
            --border-color: #d2d2d7;
            --radius-sf: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 16px;
            letter-spacing: -0.02em;
            -webkit-font-smoothing: antialiased;
        }

        header { display: flex; flex-direction: column; gap: 12px; padding-bottom: 16px; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); }
        h1 { margin: 0; font-size: 22px; font-weight: 600; }
        
        @media (min-width: 768px) {
            body { padding: 30px; }
            header { flex-direction: row; justify-content: space-between; align-items: center; padding-bottom: 24px; margin-bottom: 24px; }
            h1 { font-size: 26px; }
        }

        .sync-badge { font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: bold; background: #e3efff; color: var(--apple-blue); display: inline-block; }
        .cal-edit-group { display: flex; gap: 4px; }
        .btn-cal-action { padding: 4px 8px; font-size: 11px; border-radius: 6px; font-weight: 600; cursor: pointer; border: 1px solid var(--border-color); background: #ffffff; }
        .btn-cal-action.add { color: var(--apple-blue); border-color: rgba(0, 113, 227, 0.3); }
        .btn-cal-action.del { color: var(--apple-red); border-color: rgba(255, 59, 48, 0.3); }

        .dashboard { display: flex; flex-direction: column; gap: 16px; }
        @media (min-width: 1024px) { .dashboard { display: grid; grid-template-columns: 1fr 1.2fr 1.2fr; gap: 24px; height: calc(100vh - 130px); min-height: 650px; } }

        .panel { background: var(--card-bg); border-radius: var(--radius-sf); display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); border: 1px solid rgba(0,0,0,0.02); overflow: hidden; min-height: 350px; }
        @media (min-width: 1024px) { .panel { min-height: auto; } }

        .panel-split { display: flex; flex-direction: column; gap: 16px; background: transparent; box-shadow: none; border: none; overflow: hidden; }
        @media (min-width: 1024px) { .panel-split { display: grid; grid-template-rows: 1fr 1fr; gap: 16px; } }

        .sub-panel { background: var(--card-bg); border-radius: var(--radius-sf); border: 1px solid rgba(0,0,0,0.04); display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); overflow: hidden; min-height: 250px; }
        @media (min-width: 1024px) { .sub-panel { min-height: auto; } }

        .panel-header { padding: 14px 16px; font-weight: 600; font-size: 14px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: #ffffff; }
        .panel-body { padding: 16px; flex: 1; overflow-y: auto; }

        .calendar-wrapper { width: 100%; height: 100%; min-height: 320px; border: none; border-radius: 8px; }
        input[type="text"], textarea { font-family: inherit; color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 8px; padding: 8px 12px; background-color: #fafafa; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        .task-group { background: #fafafa; border-radius: var(--radius-sf); margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.03); overflow: hidden; }
        .task-group-title { padding: 12px 16px; background: #f1f1f4; font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .task-group-title input.title-edit { border: none; background: transparent; font-weight: 600; font-size: 13px; width: 65%; }

        .todo-item { display: flex; align-items: center; padding: 10px 14px; gap: 10px; background-color: #ffffff; border-left: 4px solid transparent; }
        .todo-item + .todo-item { border-top: 1px solid #f5f5f7; }
        .todo-item.active-link { background-color: #e3efff !important; border-left: 4px solid var(--apple-blue); }
        .todo-item input[type="text"] { flex: 1; border: none; background: transparent; padding: 4px 6px; font-size: 13px; }
        
        .todo-item input[type="checkbox"] { appearance: none; width: 18px; height: 18px; border: 1.5px solid var(--border-color); border-radius: 50%; cursor: pointer; position: relative; flex-shrink: 0; }
        .todo-item input[type="checkbox"]:checked { background-color: var(--apple-blue); border-color: var(--apple-blue); }
        .todo-item input[type="checkbox"]:checked::after { content: '✓'; position: absolute; color: white; font-size: 11px; font-weight: bold; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .todo-item.done input[type="text"] { text-decoration: line-through; color: var(--text-secondary); }

        .memo-target-title { font-size: 12px; color: var(--apple-blue); font-weight: 500; margin-bottom: 8px; }
        .record-area { width: 100%; flex: 1; resize: none; background-color: #fafafa; min-height: 180px; }

        .archive-list { display: flex; flex-direction: column; gap: 8px; }
        .archive-item { padding: 10px 14px; background-color: #fafafa; border-radius: 8px; border: 1px solid rgba(0,0,0,0.03); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .archive-item.active-archive { background-color: #e3efff; border-color: var(--apple-blue); }
        .archive-meta { font-size: 11px; color: var(--text-secondary); }
        .archive-title { font-size: 13px; font-weight: 600; }
        .archive-preview { font-size: 11px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .has-memo-badge { font-size: 9px; background-color: #e3efff; color: var(--apple-blue); padding: 2px 6px; border-radius: 10px; font-weight: bold; }
        .empty-badge { font-size: 9px; background-color: #eee; color: #aaa; padding: 2px 6px; border-radius: 10px; }

        .action-icon { border: none; background: none; cursor: pointer; color: var(--text-secondary); }
        .btn-filled-green { background-color: var(--apple-green); color: white; border: none; padding: 4px 12px; font-size: 11px; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>Master Dashboard v5.8</h1>
        <div class="btn-group">
            <span id="sync-status" class="sync-badge">☁️ 클라우드 실시간 동기화 활성</span>
        </div>
    </header>

    <div class="dashboard">
        <!-- 구글 캘린더 연동 영역 -->
        <div class="panel">
            <div class="panel-header">
                <span>🕒 오늘의 일정 (구글 연동)</span>
                <div class="cal-edit-group">
                    <button class="btn-cal-action add" onclick="openGoogleCalendarAdd()">➕ 일정 추가</button>
                    <button class="btn-cal-action del" onclick="openGoogleCalendarMain()">❌ 관리/삭제</button>
                    <button class="btn-cal-action" style="color:var(--text-secondary);" onclick="setupCalendarAddress()">⚙️ 설정</button>
                </div>
            </div>
            <div class="panel-body" style="padding: 0; overflow: hidden;">
                <iframe id="gcal-iframe" class="calendar-wrapper" src="about:blank"></iframe>
            </div>
        </div>

        <!-- 주요 태스크별 To-Do 영역 -->
        <div class="panel">
            <div class="panel-header">
                <span>🗂️ 주요 태스크별 To-Do</span>
                <button class="btn-filled-green" onclick="addNewTaskGroup()">+ 태스크 추가</button>
            </div>
            <div class="panel-body" id="task-panel-body"></div>
        </div>

        <!-- 상하 2단 메모 아카이브 영역 -->
        <div class="panel panel-split">
            <div class="sub-panel">
                <div class="panel-header"><span>📝 메모 내용 열람 및 수정</span></div>
                <div class="panel-body" style="display:flex; flex-direction:column;">
                    <div id="memo-target-display" class="memo-target-title">📌 To-Do 항목을 선택하세요.</div>
                    <textarea id="record-text" class="record-area" disabled placeholder="할 일을 선택하면 전용 메모장이 활성화됩니다." oninput="cloudSaveMemo(this.value)"></textarea>
                </div>
            </div>

            <div class="sub-panel">
                <div class="panel-header"><span>🗄️ 메모 아카이브 목록</span></div>
                <div class="panel-body" id="memo-archive-container"></div>
            </div>
        </div>
    </div>

    <script>
        // 공용 안전 실시간 클라우드 DB 계정 바인딩
        const SUPABASE_URL = 'https://xtfcrgswgquqehgclpka.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0ZmNyZ3N3Z3F1cWVoZ2NscGthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTczMzYwMDAsImV4cCI6MjAyODkxMjAwMH0.1_K_uOQCvS7zVpG5rW9t8hF8XbZDxm646mU4_K3f0w8';
        const supabase = gapi = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let memoStorage = {};
        let currentActiveTodoId = null;
        let googleCalendarUrl = "";
        const USER_ID = 'yjd2020'; // 교수님 전용 고유 채널 코드

        window.onload = async function() {
            document.getElementById('sync-status').innerText = "🔄 클라우드 데이터 매칭 중...";
            await loadCloudData();
            loadCalendar();
        }

        async function loadCloudData() {
            try {
                let { data, error } = await supabase.from('user_dashboards').select('content').eq('user_id', USER_ID).single();
                if (data && data.content) {
                    const cloudData = data.content;
                    memoStorage = cloudData.memoStorage || {};
                    googleCalendarUrl = cloudData.googleCalendarUrl || "";
                    renderAllData(cloudData);
                    document.getElementById('sync-status').innerText = "🟢 실시간 클라우드 연동 완결";
                } else {
                    setDefaultTasks();
                    await saveCloudData();
                }
            } catch (e) {
                setDefaultTasks();
                document.getElementById('sync-status').innerText = "🟡 오프라인 모드 작동 중";
            }
        }

        async function saveCloudData() {
            const data = collectAllData();
            document.getElementById('sync-status').innerText = "⚡ 실시간 자동 저장 중...";
            await supabase.from('user_dashboards').upsert({ user_id: USER_ID, content: data });
            document.getElementById('sync-status').innerText = "🟢 실시간 클라우드 연동 완결";
        }

        function openGoogleCalendarAdd() { window.open("https://calendar.google.com/calendar/render?action=TEMPLATE", "_blank"); }
        function openGoogleCalendarMain() { window.open("https://calendar.google.com/calendar", "_blank"); }

        function setupCalendarAddress() {
            const userUrl = prompt("구글 캘린더 [이 캘린더의 공개 URL] 주소를 입력해주세요.", googleCalendarUrl);
            if (userUrl !== null) {
                googleCalendarUrl = userUrl;
                loadCalendar();
                saveCloudData();
            }
        }

        function loadCalendar() {
            const iframe = document.getElementById('gcal-iframe');
            if (googleCalendarUrl && googleCalendarUrl.trim() !== "") {
                let targetUrl = googleCalendarUrl;
                if(!targetUrl.includes("mode=")) {
                    targetUrl += (targetUrl.includes("?") ? "&" : "?") + "mode=AGENDA&wkst=1&bgcolor=%23ffffff&ctz=Asia%2FSeoul";
                }
                iframe.src = targetUrl;
            } else {
                iframe.srcdoc = `<div style="font-family:sans-serif; color:#86868b; text-align:center; margin-top:80px; font-size:12px; padding:20px;">[⚙️ 설정]을 눌러 구글 캘린더 주소를 연동해 주세요.</div>`;
            }
        }

        function setDefaultTasks() {
            addNewTaskGroup('🏛️ 협회(KIA) 관련 업무');
            addNewTaskGroup('🏗️ 도시·건축 프로젝트 / 마스터플랜');
            addNewTaskGroup('🎓 위원회·자문 / 대학 강의');
        }

        function renderAllData(data) {
            document.getElementById('task-panel-body').innerHTML = '';
            if(data.taskGroups && data.taskGroups.length > 0) {
                data.taskGroups.forEach(g => addNewTaskGroup(g.title, g.todos));
            } else { setDefaultTasks(); }
            resetMemoArea();
            refreshMemoArchiveList();
        }

        function addNewTaskGroup(titleText = '새 태스크 그룹', todosArray = []) {
            const container = document.getElementById('task-panel-body');
            const groupId = 'group-' + Date.now() + Math.random().toString(36).substr(2, 5);
            const groupDiv = document.createElement('div');
            groupDiv.className = 'task-group';
            groupDiv.id = groupId;
            groupDiv.innerHTML = `
                <div class="task-group-title">
                    <input type="text" class="title-edit" value="${titleText}" onchange="saveCloudData()">
                    <div>
                        <button class="action-icon" onclick="addTodoItem('${groupId}')" style="color:var(--apple-blue); font-weight:bold; font-size:11px; border:none; background:none; cursor:pointer;">+ 할일</button>
                        <button class="action-icon" onclick="removeTaskGroup('${groupId}')" style="border:none; background:none; cursor:pointer;">✕</button>
                    </div>
                </div>
                <div class="todo-container" id="todo-container-${groupId}"></div>
            `;
            container.appendChild(groupDiv);

            if(todosArray.length > 0) {
                todosArray.forEach(t => addTodoItem(groupId, t.text, t.checked, t.id));
            } else { addTodoItem(groupId); }
            refreshMemoArchiveList();
        }

        function removeTaskGroup(groupId) {
            if(confirm('태스크 그룹을 삭제하시겠습니까?')) {
                document.getElementById(groupId).remove();
                resetMemoArea();
                refreshMemoArchiveList();
                saveCloudData();
            }
        }

        function addTodoItem(groupId, text = '', checked = false, existingId = null) {
            const container = document.getElementById(`todo-container-${groupId}`);
            const todoId = existingId || 'todo-' + Date.now() + Math.random().toString(36).substr(2, 5);
            const div = document.createElement('div');
            div.className = `todo-item ${checked ? 'done' : ''}`;
            div.id = todoId;
            div.innerHTML = `
                <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleTodo(this)">
                <input type="text" value="${text}" placeholder="할 일 입력..." onfocus="selectTodoItem('${todoId}')" onchange="saveCloudData()" oninput="syncMemoHeader('${todoId}', this.value)">
                <button class="action-icon" onclick="deleteTodoItem('${todoId}')" style="border:none; background:none; cursor:pointer;">✕</button>
            `;
            container.appendChild(div);
            if(!memoStorage[todoId]) { memoStorage[todoId] = ""; }
            refreshMemoArchiveList();
        }

        function deleteTodoItem(todoId) {
            document.getElementById(todoId).remove();
            delete memoStorage[todoId];
            if(currentActiveTodoId === todoId) { resetMemoArea(); }
            refreshMemoArchiveList();
            saveCloudData();
        }

        function toggleTodo(chk) {
            if(chk.checked) chk.parentElement.classList.add('done');
            else chk.parentElement.classList.remove('done');
            saveCloudData();
        }

        function selectTodoItem(todoId) {
            document.querySelectorAll('.todo-item').forEach(el => el.classList.remove('active-link'));
            document.querySelectorAll('.archive-item').forEach(el => el.classList.remove('active-archive'));
            const todoEl = document.getElementById(todoId);
            if (!todoEl) return;
            todoEl.classList.add('active-link');
            const archiveEl = document.getElementById('archive-' + todoId);
            if(archiveEl) archiveEl.classList.add('active-archive');
            currentActiveTodoId = todoId;
            const todoText = todoEl.querySelector('input[type="text"]').value || "내용 없음";
            const groupTitle = todoEl.closest('.task-group').querySelector('.title-edit').value;
            document.getElementById('memo-target-display').innerText = `📌 [${groupTitle}] ➔ "${todoText}"`;
            const textarea = document.getElementById('record-text');
            textarea.disabled = false;
            textarea.value = memoStorage[todoId] || "";
        }

        function syncMemoHeader(todoId, val) {
            if(currentActiveTodoId === todoId) {
                const todoEl = document.getElementById(todoId);
                const groupTitle = todoEl.closest('.task-group').querySelector('.title-edit').value;
                document.getElementById('memo-target-display').innerText = `📌 [${groupTitle}] ➔ "${val || '내용 없음'}"`;
            }
            const archiveTitleEl = document.querySelector(`#archive-${todoId} .archive-title`);
            if(archiveTitleEl) archiveTitleEl.innerText = val || "내용 없음";
        }

        // 메모 입력 시 딜레이 없이 실시간 클라우드 자동 저장 트리거
        let saveTimeout;
        function cloudSaveMemo(val) {
            if(currentActiveTodoId) {
                memoStorage[currentActiveTodoId] = val;
                const previewEl = document.querySelector(`#archive-${currentActiveTodoId} .archive-preview`);
                if(previewEl) previewEl.innerText = val ? val.replace(/\n/g, ' ') : "작성된 메모가 없습니다.";
                
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(saveCloudData, 1000); // 타이핑이 1초 멈추면 클라우드로 완전 자동 전송
            }
        }

        function refreshMemoArchiveList() {
            const container = document.getElementById('memo-archive-container');
            container.innerHTML = '';
            const groups = document.querySelectorAll('#task-panel-body .task-group');
            if(groups.length === 0) return;
            const wrapper = document.createElement('div');
            wrapper.className = 'archive-list';
            groups.forEach(group => {
                const groupTitle = group.querySelector('.title-edit').value;
                const todos = group.querySelectorAll('.todo-item');
                todos.forEach(todo => {
                    const todoId = todo.id;
                    const todoText = todo.querySelector('input[type="text"]').value || "내용 없음";
                    const memoText = memoStorage[todoId] || "";
                    const hasMemo = memoText.trim().length > 0;
                    const itemDiv = document.createElement('div');
                    itemDiv.className = `archive-item ${currentActiveTodoId === todoId ? 'active-archive' : ''}`;
                    itemDiv.id = 'archive-' + todoId;
                    itemDiv.onclick = function() { selectTodoItem(todoId); };
                    itemDiv.innerHTML = `
                        <div style="flex:1; overflow:hidden;">
                            <div class="archive-meta">${groupTitle}</div>
                            <div class="archive-title">${todoText}</div>
                            <div class="archive-preview">${hasMemo ? memoText.replace(/\n/g, ' ') : '작성된 메모가 없습니다.'}</div>
                        </div>
                        <div class="badge-zone" style="margin-left:8px;">
                            ${hasMemo ? '<span class="has-memo-badge">메모보유</span>' : '<span class="empty-badge">비어있음</span>'}
                        </div>
                    `;
                    wrapper.appendChild(itemDiv);
                });
            });
            container.appendChild(wrapper);
        }

        function resetMemoArea() {
            currentActiveTodoId = null;
            document.getElementById('memo-target-display').innerText = "📌 To-Do 항목을 선택하세요.";
            const textarea = document.getElementById('record-text');
            textarea.value = "";
            textarea.disabled = true;
        }

        function collectAllData() {
            const taskGroupsData = [];
            document.querySelectorAll('#task-panel-body .task-group').forEach(group => {
                const title = group.querySelector('.title-edit').value;
                const todos = [];
                group.querySelectorAll('.todo-item').forEach(todo => {
                    todos.push({ id: todo.id, checked: todo.querySelector('input[type="checkbox"]').checked, text: todo.querySelector('input[type="text"]').value });
                });
                taskGroupsData.push({ title, todos });
            });
            return { taskGroups: taskGroupsData, memoStorage: memoStorage, googleCalendarUrl: googleCalendarUrl };
        }

        async function clearData() {
            if(confirm('모든 데이터를 초기화하시겠습니까?')) {
                document.getElementById('sync-status').innerText = "🔄 클라우드 청소 중...";
                await supabase.from('user_dashboards').delete().eq('user_id', USER_ID);
                location.reload();
            }
        }
    </script>
</body>
</html>
